version: 2
updates:
  - package-ecosystem: npm
    directory: /
    target-branch: main
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: America/Argentina/Buenos_Aires
    open-pull-requests-limit: 5
    versioning-strategy: increase
    labels:
      - dependencies
      - security
    commit-message:
      prefix: chore(deps)
    groups:
      npm-development-dependencies:
        dependency-type: development
        patterns:
          - "*"
      npm-production-dependencies:
        dependency-type: production
        patterns:
          - "*"

  - package-ecosystem: npm
    directory: /client
    target-branch: main
    schedule:
      interval: weekly
      day: monday
      time: "09:15"
      timezone: America/Argentina/Buenos_Aires
    open-pull-requests-limit: 3
    versioning-strategy: increase
    labels:
      - dependencies
      - security
    commit-message:
      prefix: chore(deps)

  - package-ecosystem: npm
    directory: /server
    target-branch: main
    schedule:
      interval: weekly
      day: monday
      time: "09:30"
      timezone: America/Argentina/Buenos_Aires
    open-pull-requests-limit: 3
    versioning-strategy: increase
    labels:
      - dependencies
      - security
    commit-message:
      prefix: chore(deps)

  - package-ecosystem: github-actions
    directory: /
    target-branch: main
    schedule:
      interval: weekly
      day: monday
      time: "09:45"
      timezone: America/Argentina/Buenos_Aires
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - security
    commit-message:
      prefix: chore(actions)
