# Complex multi-feature HAProxy config — rate limiting, caching, peers, resolvers
global
    daemon
    log /dev/log local0 info
    log /dev/log local1 notice
    maxconn 100000
    nbthread 8
    stats socket /run/haproxy/admin.sock mode 660 level admin expose-fd listeners
    stats timeout 30s
    ssl-default-bind-options ssl-min-ver TLSv1.2
    tune.ssl.default-dh-param 2048

resolvers dns-resolvers
    nameserver ns1 8.8.8.8:53
    nameserver ns2 8.8.4.4:53
    resolve_retries 3
    timeout retry 1s
    hold valid 10s

peers haproxy-peers
    peer node1 10.0.0.1:1024
    peer node2 10.0.0.2:1024

defaults
    mode http
    log global
    option httplog
    option dontlognull
    option forwardfor except 127.0.0.0/8
    option http-server-close
    option redispatch
    retries 3
    timeout http-request 10s
    timeout queue 1m
    timeout connect 10s
    timeout client 1m
    timeout server 1m
    timeout http-keep-alive 10s
    timeout check 10s
    maxconn 3000

frontend http-in
    bind *:80
    bind *:443 ssl crt /etc/ssl/haproxy.pem alpn h2,http/1.1
    mode http
    # Rate limiting using stick tables
    stick-table type ip size 1m expire 10s store http_req_rate(10s),conn_rate(60s)
    http-request track-sc0 src
    http-request deny deny_status 429 if { sc_http_req_rate(0) gt 100 }
    # Bot detection
    acl is_crawler hdr_sub(user-agent) -i bot crawler spider
    http-request deny if is_crawler
    # Routing ACLs
    acl is_api path_beg /api /graphql
    acl is_ws hdr(Upgrade) -i websocket
    acl is_static path_reg \.(js|css|png|jpg|svg|woff2?)$
    acl is_health path_eq /health /ready /live
    # Fast-path health checks
    http-request return status 200 content-type text/plain lf-string "OK\n" if is_health
    # Route to appropriate backends
    use_backend api-backend if is_api
    use_backend ws-backend if is_ws
    use_backend static-cache if is_static
    default_backend web-backend

frontend stats-internal
    bind 127.0.0.1:8404
    mode http
    stats enable
    stats uri /stats
    stats refresh 10s
    stats admin if TRUE
    stats auth admin:changeme

backend web-backend
    mode http
    balance roundrobin
    option httpchk GET /health HTTP/1.1
    http-check expect status 200
    # Compression
    compression algo gzip
    compression type text/html text/plain application/json
    # Headers
    http-request set-header X-Backend web
    http-request set-header X-Real-IP %[src]
    # Server pool
    server web1 10.1.0.1:8080 check inter 2s rise 2 fall 3 weight 10
    server web2 10.1.0.2:8080 check inter 2s rise 2 fall 3 weight 10
    server web3 10.1.0.3:8080 check inter 2s rise 2 fall 3 weight 10
    server web-canary 10.1.0.4:8080 check inter 2s rise 2 fall 3 weight 1

backend api-backend
    mode http
    balance leastconn
    option httpchk GET /api/health
    http-check expect status 200
    http-request set-header X-Backend api
    timeout server 60s
    server api1 10.2.0.1:9000 check inter 2s
    server api2 10.2.0.2:9000 check inter 2s
    server api3 10.2.0.3:9000 check inter 2s

backend ws-backend
    mode http
    balance source
    timeout tunnel 1h
    option httpchk GET /ws/health
    server ws1 10.3.0.1:8080 check inter 5s
    server ws2 10.3.0.2:8080 check inter 5s

backend static-cache
    mode http
    balance roundrobin
    server cdn1 10.4.0.1:80 check
    server cdn2 10.4.0.2:80 check

listen mysql-cluster
    bind *:3306
    mode tcp
    option tcp-check
    tcp-check connect
    balance leastconn
    server mysql-primary 10.5.0.1:3306 check inter 2s rise 2 fall 3
    server mysql-replica 10.5.0.2:3306 check inter 2s rise 2 fall 3 backup

userlist app-admins
    user admin password $6$saltval$hashedpassword
    user ops password $6$saltval$hashedpassword2
    group admin users admin
    group ops users ops
