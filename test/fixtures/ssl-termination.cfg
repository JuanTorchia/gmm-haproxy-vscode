# SSL termination with client certificate authentication
global
    daemon
    log /dev/log local0
    maxconn 20000
    nbthread 4
    ssl-default-bind-ciphers ECDH+AESGCM:DH+AESGCM:ECDH+AES256:DH+AES256:ECDH+AES128:DH+AES:RSA+AESGCM:RSA+AES:!aNULL:!MD5:!DSS
    ssl-default-bind-options ssl-min-ver TLSv1.2 no-tls-tickets

defaults
    mode http
    log global
    option httplog
    option dontlognull
    option forwardfor
    option http-server-close
    timeout connect 5s
    timeout client 30s
    timeout server 30s
    timeout http-request 10s

frontend https-public
    bind *:443 ssl crt /etc/ssl/haproxy.pem alpn h2,http/1.1
    bind *:80
    # Redirect HTTP to HTTPS
    http-request redirect scheme https code 301 unless { ssl_fc }
    # HSTS
    http-response set-header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload"
    # Remove server fingerprinting
    http-response del-header X-Powered-By
    http-response del-header Server
    # Security headers
    http-response set-header X-Frame-Options DENY
    http-response set-header X-Content-Type-Options nosniff
    http-response set-header Referrer-Policy strict-origin-when-cross-origin
    # ACL routing
    acl is_api hdr(host) -i api.example.com
    use_backend api-tls if is_api
    default_backend web-tls

frontend https-internal
    bind *:8443 ssl crt /etc/ssl/internal.pem ca-file /etc/ssl/ca.pem verify required
    mode http
    # mTLS — client cert CN extracted as header
    http-request set-header X-Client-CN %{+Q}[ssl_c_s_dn(cn)]
    default_backend internal-backend

backend web-tls
    mode http
    balance roundrobin
    option httpchk GET /health HTTP/1.1\r\nHost:\ example.com
    http-check expect status 200
    # Add forwarding headers
    http-request set-header X-Forwarded-Proto https
    http-request set-header X-Real-IP %[src]
    server web1 10.0.1.1:8080 check ssl verify none inter 3s rise 2 fall 3
    server web2 10.0.1.2:8080 check ssl verify none inter 3s rise 2 fall 3
    server web3 10.0.1.3:8080 check ssl verify none inter 3s rise 2 fall 3 backup

backend api-tls
    mode http
    balance leastconn
    option httpchk GET /api/healthz
    http-check expect status 200
    http-request set-header X-Forwarded-Proto https
    server api1 10.0.2.1:9443 check ssl verify required ca-file /etc/ssl/ca.pem inter 5s
    server api2 10.0.2.2:9443 check ssl verify required ca-file /etc/ssl/ca.pem inter 5s

backend internal-backend
    mode http
    balance source
    option httpchk GET /internal/health
    server int1 10.0.3.1:8080 check inter 5s
